[package]
name = "torrant"
version = "0.1.0"
edition = "2021"

[dependencies]
bytes = "1.1.0"
rand = "0.8.4"
reqwest = "0.11.6"
serde = { version = "1.0.130", features = ["derive"] }
serde_bencode = "0.2.3"
serde_bytes = "0.11.5"
sha-1 = "0.9.8"
thiserror = "1.0.30"
tokio-util = { version = "0.6.8", default-features = false, features = [
    "codec",
] }
urlencoding = "2.1.0"

[dev-dependencies]
tokio = { version = "1.13.0", features = ["macros", "rt-multi-thread"] }

[features]
